<div
    id="roadmap"
      media-timeline
      data-orientation="vertical"
      data-alternate="true"
      data-alt-invert="false"
      data-styles="track-color:#d9dde3; node-border:#4badde; node-size:14px; card-bg:#ffffff; card-color:#0b0f14; spacing:24px;"
    >
      <timeline-item
        data-date="2019"
        data-title="Project Kickoff"
        data-badge="v0.1"
        data-icon="fa-solid fa-flag-checkered"
      >
        Initial scope, team formation, and planning.
      </timeline-item>

      <timeline-item
        data-date="2021"
        data-title="Private Beta"
        data-badge="beta"
        data-icon="fa-solid fa-flask"
      >
        Invited users began testing core scenarios and integrations.
      </timeline-item>

      <!-- You can also use plain <li> or any element with .timeline-item -->
      <li class="timeline-item" data-date="2024" data-title="Public Launch" data-icon="fa-solid fa-rocket">
        GA release with docs, samples, and templates.
      </li>
    </div>
